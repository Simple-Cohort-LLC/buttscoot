name = "buttscoot-gp"
main = "src/worker.js"
compatibility_date = "2026-07-01"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

# Optional: per-IP daily rate limit for AI calls. Create a KV namespace
# (npx wrangler kv namespace create RATE_LIMIT) and uncomment:
#
# [[kv_namespaces]]
# binding = "RATE_LIMIT"
# id = "<your-kv-namespace-id>"
