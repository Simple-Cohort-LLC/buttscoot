name = "buttscoot-gp"
main = "src/worker.js"
compatibility_date = "2026-07-01"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*", "/d/*"]

# Per-IP daily rate limit for AI calls (cap set by DAILY_LIMIT in src/worker.js)
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "7f565c6b94cb4b8b8c2127e936d77ccc"
